<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>现场打卡</title>
<style>
  :root{
    --bg:#0b0e12;
    --surface:#151a21;
    --surface-2:#1d242d;
    --line:rgba(255,255,255,.06);
    --text:#fff;
    --muted:rgba(255,255,255,.55);
    --brand:#3FB6D6;
    --brand-2:#67D4E8;
    --brand-soft:rgba(63,182,214,.16);
    --ok:#4ade80;
    --warn:#fbbf24;
    --err:#f87171;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
  body{display:flex;flex-direction:column;height:100vh;height:100dvh}
  .view{display:none;flex:1;flex-direction:column;min-height:0}
  .view.active{display:flex}
  button{border:none;background:none;color:inherit;font:inherit;cursor:pointer}

  /* ---------- Entry ---------- */
  #entry{padding:48px 24px 28px;justify-content:space-between;background:radial-gradient(120% 80% at 0% 0%,rgba(63,182,214,.18),transparent 60%),radial-gradient(120% 80% at 100% 100%,rgba(63,182,214,.08),transparent 60%),var(--bg)}
  .brand{display:flex;align-items:center;gap:8px;font-family:"Cormorant Garamond","Times New Roman",serif;font-size:22px;letter-spacing:.5px;opacity:.9}
  .brand-dot{width:6px;height:6px;border-radius:50%;background:var(--brand)}
  .title{font-size:56px;font-weight:800;margin-top:48px;letter-spacing:-1px;text-align:center}
  .status-card{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:20px;margin:28px 0}
  .status-line{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:500}
  .status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 4px rgba(255,255,255,.04)}
  .status-dot.ok{background:var(--ok);box-shadow:0 0 0 4px rgba(74,222,128,.15)}
  .status-dot.warn{background:var(--warn);box-shadow:0 0 0 4px rgba(251,191,36,.15)}
  .status-dot.err{background:var(--err);box-shadow:0 0 0 4px rgba(248,113,113,.15)}
  .status-detail{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.5}
  .reauth-btn{margin-top:14px;padding:11px 16px;background:var(--surface-2);border-radius:12px;font-size:14px;width:100%;font-weight:500}
  .actions{display:flex;flex-direction:row;gap:12px;margin-bottom:8px}
  .big-btn{flex:1;padding:18px;font-size:17px;font-weight:600;border-radius:18px;display:flex;align-items:center;justify-content:center;gap:10px;transition:transform .15s}
  .big-btn:active{transform:scale(.98)}
  .btn-camera{background:var(--brand);color:#062b35;box-shadow:0 8px 24px -8px rgba(63,182,214,.5)}
  .btn-upload{background:var(--surface);color:var(--text);border:1px solid var(--line)}

  /* ---------- Camera ---------- */
  #camera{background:#000;position:relative}
  .cam-stage{position:relative;flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center}
  #video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .frame-overlay{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;pointer-events:none;z-index:2}
  .cam-top{position:absolute;top:0;left:0;right:0;padding:18px;display:flex;justify-content:space-between;z-index:3;background:linear-gradient(to bottom,rgba(0,0,0,.55),transparent)}
  .icon-btn{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.12);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;font-size:18px;transition:transform .15s}
  .icon-btn:active{transform:scale(.92)}
  .cam-bottom{position:absolute;bottom:0;left:0;right:0;z-index:3;background:linear-gradient(to top,rgba(0,0,0,.78),transparent);padding:18px 0 34px}
  /* 通用 picker:横向（editor 内用） */
  .frame-picker{display:flex;gap:10px;overflow-x:auto;padding:0 20px 18px;-webkit-overflow-scrolling:touch}
  .frame-picker::-webkit-scrollbar{display:none}
  .frame-thumb{flex-shrink:0;width:56px;height:56px;border-radius:14px;background:rgba(255,255,255,.08);padding:4px;border:2px solid transparent;transition:border-color .2s,transform .15s}
  .frame-thumb.active{border-color:var(--brand);transform:scale(1.05)}
  .frame-thumb img{width:100%;height:100%;object-fit:contain}
  /* 相机:左侧竖排 picker */
  #camPicker{position:absolute;left:14px;top:50%;transform:translateY(-50%);z-index:3;flex-direction:column;gap:10px;padding:10px 6px;max-height:60vh;overflow-y:auto;overflow-x:hidden;background:rgba(0,0,0,.32);border-radius:18px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
  #camPicker .frame-thumb{width:48px;height:48px;background:rgba(255,255,255,.1)}
  .shutter-row{display:flex;align-items:center;justify-content:center}
  .shutter{width:74px;height:74px;border-radius:50%;background:#fff;border:5px solid rgba(255,255,255,.28);background-clip:padding-box;transition:transform .15s}
  .shutter:active{transform:scale(.92)}

  /* ---------- Editor ---------- */
  #editor{background:var(--bg)}
  .ed-top{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line)}
  .ed-title{font-size:16px;font-weight:600}
  .ed-top .icon-btn{background:var(--surface)}
  .ed-stage{flex:1;display:flex;align-items:center;justify-content:center;padding:18px;min-height:0}
  #previewCanvas{max-width:100%;max-height:100%;border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
  .ed-bottom{padding:18px 16px 22px;background:var(--surface);border-top-left-radius:24px;border-top-right-radius:24px}
  .ed-label{font-size:12px;color:var(--muted);margin-bottom:12px;letter-spacing:.5px;text-transform:uppercase}
  .ed-actions{display:flex;justify-content:center;align-items:center;gap:12px;margin-top:18px}
  .ed-btn{flex:1;padding:16px 20px;border-radius:14px;font-size:16px;font-weight:600;transition:transform .15s}
  .ed-btn:active{transform:scale(.98)}
  .ed-btn.ghost{background:var(--surface-2);color:var(--text)}
  .ed-btn.primary{background:var(--brand);color:#062b35;box-shadow:0 8px 24px -8px rgba(63,182,214,.5)}

  /* ---------- Toast ---------- */
  .toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,14,18,.92);border:1px solid var(--line);padding:14px 20px;border-radius:14px;z-index:100;font-size:14px;max-width:80%;text-align:center;opacity:0;transition:opacity .3s;pointer-events:none;backdrop-filter:blur(12px)}
  .toast.show{opacity:1}

  /* ---------- Modal ---------- */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;padding:20px;backdrop-filter:blur(20px)}
  .modal.show{display:flex}
  .modal img{max-width:100%;max-height:70vh;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
  .modal-tip{margin-top:20px;font-size:14px;text-align:center;padding:12px 20px;background:var(--surface);border:1px solid var(--line);border-radius:12px;color:var(--muted)}
  .modal-close{position:absolute;top:20px;right:20px;width:40px;height:40px;border-radius:50%;background:var(--surface);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:18px}
</style>
</head>
<body>

<!-- View 1: Entry -->
<div id="entry" class="view active">
  <div>
    <div class="title">舞舞舞</div>
    <div class="status-card">
      <div class="status-line">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">正在获取位置…</span>
      </div>
      <div class="status-detail" id="statusDetail"></div>
      <button class="reauth-btn" id="reauthBtn" style="display:none">重新授权位置</button>
    </div>
  </div>
  <div class="actions">
    <button class="big-btn btn-camera" id="openCamera">拍照打卡</button>
    <button class="big-btn btn-upload" id="openUpload">上传图片</button>
    <input type="file" id="uploadInput" accept="image/*" style="display:none">
    <input type="file" id="fallbackInput" accept="image/*" capture="environment" style="display:none">
  </div>
</div>

<!-- View 2: Camera -->
<div id="camera" class="view">
  <div class="cam-stage">
    <video id="video" autoplay playsinline muted></video>
    <img class="frame-overlay" id="camFrame" alt="">
    <div class="frame-picker" id="camPicker"></div>
  </div>
  <div class="cam-top">
    <button class="icon-btn" id="camBack">✕</button>
    <button class="icon-btn" id="camSwitch">⇄</button>
  </div>
  <div class="cam-bottom">
    <div class="shutter-row">
      <button class="shutter" id="shutter"></button>
    </div>
  </div>
</div>

<!-- View 3: Editor -->
<div id="editor" class="view">
  <div class="ed-top">
    <button class="icon-btn" id="edBack">←</button>
    <div class="ed-title">相框编辑</div>
    <div style="width:40px"></div>
  </div>
  <div class="ed-stage">
    <canvas id="previewCanvas"></canvas>
  </div>
  <div class="ed-bottom">
    <div class="ed-label">选择相框</div>
    <div class="frame-picker" id="edPicker"></div>
    <div class="ed-actions" id="edActions">
      <button class="ed-btn ghost" id="edRetake">重新选择</button>
      <button class="ed-btn primary" id="edSave">保存图片</button>
    </div>
  </div>
</div>

<!-- Toast & Modal -->
<div class="toast" id="toast"></div>
<div class="modal" id="saveModal">
  <button class="modal-close" id="modalClose">✕</button>
  <img id="modalImg" alt="">
  <div class="modal-tip">长按图片保存到相册</div>
</div>

<script>
// ============ Config ============
const CONFIG = {
  location: { lat: 31.451889, lng: 121.124306 },
  radiusMeters: 500,
  frames: ['frames/frame-1.png','frames/frame-2.png','frames/frame-3.png','frames/frame-4.png','frames/frame-5.png','frames/frame-6.png','frames/frame-7.png']
};

// ============ State ============
const state = {
  geoStatus: 'pending', // pending | onsite | offsite | denied | error
  distance: null,
  currentFrames: [],
  selectedFrame: 0,
  sourceImage: null, // HTMLImageElement of raw photo/upload
  stream: null,
  facing: 'environment'
};

// ============ Utils ============
const $ = id => document.getElementById(id);
function toast(msg, ms=2000){
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), ms);
}
function switchView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  $(id).classList.add('active');
}
function haversine(lat1,lng1,lat2,lng2){
  const R=6371000, toRad=d=>d*Math.PI/180;
  const dLat=toRad(lat2-lat1), dLng=toRad(lng2-lng1);
  const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}

// ============ Geolocation ============
function requestLocation(){
  state.geoStatus='pending';
  updateStatusUI();
  if(!navigator.geolocation){ setGeo('error','浏览器不支持定位'); return; }
  navigator.geolocation.getCurrentPosition(
    pos=>{
      const d=haversine(pos.coords.latitude,pos.coords.longitude,CONFIG.location.lat,CONFIG.location.lng);
      state.distance=d;
      if(d<=CONFIG.radiusMeters){ setGeo('onsite'); } else { setGeo('offsite'); }
    },
    err=>{
      if(err.code===1) setGeo('denied');
      else setGeo('error', err.message);
    },
    { enableHighAccuracy:true, timeout:10000, maximumAge:60000 }
  );
}
function setGeo(status, msg){
  state.geoStatus=status;
  updateStatusUI(msg);
  updateFrames();
}
function updateStatusUI(msg){
  const dot=$('statusDot'), txt=$('statusText'), detail=$('statusDetail'), re=$('reauthBtn');
  const camBtn=$('openCamera');
  re.style.display='none';
  camBtn.disabled=false;
  camBtn.style.opacity='1';
  switch(state.geoStatus){
    case 'pending':
      dot.className='status-dot warn'; txt.textContent='正在获取位置…'; detail.textContent='';
      camBtn.disabled=true; camBtn.style.opacity='0.5'; break;
    case 'onsite':
      dot.className='status-dot ok'; txt.textContent='✅ 已在现场';
      detail.textContent=`距活动点 ${Math.round(state.distance)}m · 可拍照打卡`; break;
    case 'offsite':
      dot.className='status-dot warn'; txt.textContent='⚠️ 不在现场范围';
      detail.textContent=`距活动点 ${Math.round(state.distance)}m · 仅支持上传图片`;
      camBtn.disabled=true; camBtn.style.opacity='0.5';
      re.style.display='block'; re.textContent='重新定位'; break;
    case 'denied':
      dot.className='status-dot err'; txt.textContent='📍 未授权位置';
      detail.textContent='授权后可拍照打卡 · 当前仅支持上传';
      camBtn.disabled=true; camBtn.style.opacity='0.5';
      re.style.display='block'; re.textContent='授权位置'; break;
    case 'error':
      dot.className='status-dot err'; txt.textContent='定位失败';
      detail.textContent=(msg||'请检查网络或重试') + ' · 仅支持上传图片';
      camBtn.disabled=true; camBtn.style.opacity='0.5';
      re.style.display='block'; re.textContent='重新尝试'; break;
  }
}
function updateFrames(){
  state.currentFrames = CONFIG.frames;
  state.selectedFrame = 0;
}

// ============ Camera ============
async function startCamera(){
  try{
    if(state.stream) state.stream.getTracks().forEach(t=>t.stop());
    state.stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode: state.facing, width:{ ideal:1920 }, height:{ ideal:1080 } }, audio:false
    });
    const video=$('video');
    video.srcObject = state.stream;
    // iOS/部分浏览器首屏 autoplay 不稳,显式等 metadata 就绪后 play
    await new Promise(res=>{
      if(video.readyState>=1) return res();
      video.onloadedmetadata=()=>res();
    });
    try{ await video.play(); }catch(e){ console.warn('video.play failed', e); }
    return true;
  }catch(e){
    console.warn('getUserMedia failed', e);
    return false;
  }
}
function stopCamera(){
  if(state.stream){ state.stream.getTracks().forEach(t=>t.stop()); state.stream=null; }
}
function renderPicker(container, onSelect){
  container.innerHTML='';
  state.currentFrames.forEach((src,i)=>{
    const btn=document.createElement('button');
    btn.className='frame-thumb'+(i===state.selectedFrame?' active':'');
    btn.innerHTML=`<img src="${src}" alt="">`;
    btn.onclick=()=>{
      state.selectedFrame=i;
      container.querySelectorAll('.frame-thumb').forEach((el,idx)=>el.classList.toggle('active',idx===i));
      onSelect(i);
    };
    container.appendChild(btn);
  });
}

// ============ Canvas Compose ============
function loadImg(src){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.crossOrigin='anonymous';
    img.onload=()=>res(img);
    img.onerror=rej;
    img.src=src;
  });
}
async function composeToCanvas(canvas, sourceImg, frameSrc){
  const ctx=canvas.getContext('2d');
  const sw=sourceImg.naturalWidth||sourceImg.videoWidth||sourceImg.width;
  const sh=sourceImg.naturalHeight||sourceImg.videoHeight||sourceImg.height;
  const frame=await loadImg(frameSrc);
  // 画布尺寸取 source 与 frame 的较大值（按 source 比例放大），避免相框被降采样
  const sr=sw/sh;
  const scale=Math.max(1, frame.naturalWidth/sw, frame.naturalHeight/sh);
  const w=Math.round(sw*scale), h=Math.round(sh*scale);
  canvas.width=w; canvas.height=h;
  ctx.imageSmoothingEnabled=true;
  ctx.imageSmoothingQuality='high';
  ctx.drawImage(sourceImg,0,0,w,h);
  const fr=frame.naturalWidth/frame.naturalHeight;
  const cr=w/h;
  let dw,dh,dx,dy;
  if(fr>cr){ dw=w; dh=w/fr; dx=0; dy=(h-dh)/2; }
  else    { dh=h; dw=h*fr; dy=0; dx=(w-dw)/2; }
  ctx.drawImage(frame,dx,dy,dw,dh);
}

// ============ Events ============
$('reauthBtn').onclick=requestLocation;

$('openCamera').onclick=async()=>{
  if(state.geoStatus!=='onsite'){
    toast('请先到达活动现场后再拍照');
    return;
  }
  switchView('camera');
  const ok=await startCamera();
  if(!ok){
    toast('相机不可用，改用系统相机');
    switchView('entry');
    $('fallbackInput').click();
    return;
  }
  $('camFrame').src = state.currentFrames[state.selectedFrame];
  renderPicker($('camPicker'), i=>{ $('camFrame').src = state.currentFrames[i]; });
};

$('openUpload').onclick=()=> $('uploadInput').click();

$('uploadInput').onchange=async(e)=>{
  const f=e.target.files?.[0]; if(!f) return;
  const url=URL.createObjectURL(f);
  state.sourceImage=await loadImg(url);
  enterEditor();
};
$('fallbackInput').onchange=async(e)=>{
  const f=e.target.files?.[0]; if(!f) return;
  const url=URL.createObjectURL(f);
  state.sourceImage=await loadImg(url);
  enterEditor();
};

$('camBack').onclick=()=>{ stopCamera(); switchView('entry'); };
$('camSwitch').onclick=async()=>{
  state.facing = state.facing==='environment'?'user':'environment';
  await startCamera();
};

$('shutter').onclick=async()=>{
  const video=$('video');
  const c=document.createElement('canvas');
  c.width=video.videoWidth; c.height=video.videoHeight;
  c.getContext('2d').drawImage(video,0,0);
  // 直接用 canvas 作为源,跳过 JPEG 编解码,保持无损
  state.sourceImage=c;
  stopCamera();
  enterEditor();
};

async function enterEditor(){
  switchView('editor');
  await renderEditor();
  renderPicker($('edPicker'), async()=>{ await renderEditor(); });
}
async function renderEditor(){
  await composeToCanvas($('previewCanvas'), state.sourceImage, state.currentFrames[state.selectedFrame]);
}

$('edBack').onclick=()=>{ switchView('entry'); };
$('edRetake').onclick=()=>{ switchView('entry'); };

$('edSave').onclick=()=>{
  const canvas=$('previewCanvas');
  // iOS 微信无法直接下载，用弹窗长按保存
  const dataUrl=canvas.toDataURL('image/jpeg',0.92);
  const isIOS=/iPhone|iPad|iPod/.test(navigator.userAgent);
  const isWeixin=/MicroMessenger/i.test(navigator.userAgent);
  if(isIOS || isWeixin){
    $('modalImg').src=dataUrl;
    $('saveModal').classList.add('show');
  } else {
    const a=document.createElement('a');
    a.href=dataUrl;
    a.download=`checkin-${Date.now()}.jpg`;
    document.body.appendChild(a); a.click(); a.remove();
    toast('已保存');
  }
};
$('modalClose').onclick=()=> $('saveModal').classList.remove('show');

// ============ Init ============
window.addEventListener('load', ()=>{
  requestLocation();
});
</script>
</body>
</html>
